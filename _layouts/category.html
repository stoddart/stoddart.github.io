---
layout: default
---
<h1>{{ page.title }}</h1>
<ul class="post-list">
  {% for post in site.posts %}
    {% if post.categories contains page.title %}
    <li>
      <span class="post-meta">{{ post.date | date: "%B %-d, %Y" }}</span>
      <a class="post-link" href="{{ post.url }}">{{ post.title }}</a>
    </li>
    {% endif %}
  {% endfor %}
</ul>
